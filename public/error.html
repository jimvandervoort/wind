<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0c1215"/>
  <title>Jimwind is down</title>
  <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌬️</text></svg>">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0c1215;
      color: #e6edf0;
      font-family: "Roboto", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .wrap {
      min-height: 100%;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
      gap: 1rem;
    }
    .fish {
      width: 180px;
      max-width: 55vw;
      height: auto;
    }
    h1 {
      margin: 0.5rem 0 0;
      font-size: clamp(1.5rem, 5vw, 2.25rem);
      font-weight: 700;
    }
    p {
      margin: 0;
      font-size: clamp(1rem, 3vw, 1.15rem);
      color: #9fb0b8;
      max-width: 32rem;
    }
    a {
      color: #4fc3f7;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="fish" src="/sad_fish.png" alt="A sad fish"/>
    <h1>Sorry, Jimwind is down right now</h1>
    <p>We are unable to download weather data from our sources.</p>
    <p>If this stays up, contact <a href="mailto:wind@jim.computer">wind@jim.computer</a>.</p>
  </div>
</body>
</html>
